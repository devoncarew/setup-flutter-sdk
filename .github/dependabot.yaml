# https://docs.github.com/en/code-security/tutorials/secure-your-dependencies.

version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    groups:
      npm-dependencies:
        patterns:
          - "*"
